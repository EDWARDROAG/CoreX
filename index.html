<!-- ========================================================================== -->

<!--  📄 ARCHIVO: index.html                                                    -->

<!--  🚀 MÓDULO: Frontend - Entry Point                                         -->
<!--  🏷️  VERSIÓN: v1.0.0                                                      -->
<!--  📅 ÚLTIMA ACTUALIZACIÓN: 2026-06-09 10:30                                 -->
<!--  👨‍💻 AUTOR: CoreX Team                                                     -->
<!--                                                                            -->
<!-- ========================================================================== -->
<!--                                                                            -->
<!--  🎯 PROPÓSITO                                                              -->
<!--  ------------------------------------------------------------------------  -->
<!--  Punto de entrada principal de la aplicación web CoreX.                   -->
<!--  Define la estructura base del HTML, meta tags, títulos, fuentes y        -->
<!--  el contenedor raíz donde React montará toda la interfaz.                 -->
<!--                                                                            -->
<!--  🧩 FUNCIONALIDADES PRINCIPALES                                            -->
<!--  ------------------------------------------------------------------------  -->
<!--  ✅ Contenedor raíz #root para React                                       -->
<!--  ✅ Viewport responsive para dispositivos móviles                          -->
<!--  ✅ Meta tags para SEO y redes sociales                                    -->
<!--  ✅ Preconexión a APIs y servicios externos                                -->
<!--  ✅ Soporte para tema oscuro/claro (prefers-color-scheme)                 -->
<!--  ✅ Fuentes optimizadas y fallbacks                                        -->
<!--                                                                            -->
<!--  📦 DEPENDENCIAS                                                           -->
<!--  ------------------------------------------------------------------------  -->
<!--  • React 18 - Biblioteca principal                                         -->
<!--  • React DOM - Renderizado                                                 -->
<!--  • TailwindCSS - Estilos (enlazado desde assets)                          -->
<!--                                                                            -->
<!--  🔗 RELACIONES                                                             -->
<!--  ------------------------------------------------------------------------  -->
<!--  • Importa: src/index.js (punto de entrada React)                         -->
<!--  • Usa: Vite como bundler                                                  -->
<!--  • Relacionado con: public/logo.png, public/favicon.ico                   -->
<!--                                                                            -->
<!--  ⚠️ NOTAS IMPORTANTES                                                      -->
<!--  ------------------------------------------------------------------------  -->
<!--  • No modificar el div con id="root" - React lo necesita                  -->
<!--  • Las variables de entorno de Vite usan prefijo VITE_                    -->
<!--  • El manifest.json es opcional pero recomendado para PWA                 -->
<!--  • Los estilos se inyectan automáticamente por Vite en producción        -->
<!--                                                                            -->
<!--  🛠️ HISTORIAL DE CAMBIOS                                                   -->
<!--  ------------------------------------------------------------------------  -->
<!--  [v1.0.0] - 2026-06-09                                                    -->
<!--      ✅ Creación inicial del index.html                                   -->
<!--      ✅ Configuración de meta tags para SEO                               -->
<!--      ✅ Soporte para tema oscuro/claro                                    -->
<!--      ✅ Integración con React y Vite                                      -->
<!--                                                                            -->
<!-- ========================================================================== -->

<html lang="es">
  <head>
    <!-- ======================================================================= -->
    <!-- METADATOS BÁSICOS                                                       -->
    <!-- ======================================================================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- ======================================================================= -->
    <!-- TÍTULO Y DESCRIPCIÓN                                                    -->
    <!-- ======================================================================= -->
    <title>CoreX - Tecnología y Servicios | Mantenimiento y Venta de Equipos</title>
    <meta name="title" content="CoreX - Tecnología y Servicios" />
    <meta name="description" content="Venta de computadores, celulares, impresoras y laptops. Mantenimiento técnico especializado. Facturación POS y soporte en WhatsApp." />
    <meta name="keywords" content="mantenimiento de computadores, venta de celulares, reparación de laptops, impresoras nuevas y usadas, iPhone, CoreX, tecnología" />
    <meta name="author" content="CoreX Team" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Spanish" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- ======================================================================= -->
    <!-- ICONOS Y FAVICON                                                        -->
    <!-- ======================================================================= -->
    <link rel="icon" type="image/png" href="images/logo_favicon.png" />
    <link rel="apple-touch-icon" href="images/logo_favicon.png" />
    <link rel="shortcut icon" href="images/logo_favicon.png" />
    
    <!-- ======================================================================= -->
    <!-- OPEN GRAPH (REDES SOCIALES)                                             -->
    <!-- ======================================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://corex.com/" />
    <meta property="og:title" content="CoreX - Tecnología y Servicios" />
    <meta property="og:description" content="Venta y mantenimiento de equipos tecnológicos. Ventas por WhatsApp con facturación POS." />
    <meta property="og:image" content="images/logo_favicon.png" />
    <meta property="og:site_name" content="CoreX" />
    <meta property="og:locale" content="es_CO" />
    
    <!-- ======================================================================= -->
    <!-- TWITTER CARD                                                            -->
    <!-- ======================================================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://corex.com/" />
    <meta name="twitter:title" content="CoreX - Tecnología y Servicios" />
    <meta name="twitter:description" content="Venta y mantenimiento de equipos tecnológicos. Ventas por WhatsApp con facturación POS." />
    <meta name="twitter:image" content="images/logo_favicon.png" />
    
    <!-- ======================================================================= -->
    <!-- TEMA Y COLORES                                                          -->
    <!-- ======================================================================= -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="color-scheme" content="light dark" />
    <meta name="msapplication-TileColor" content="#2563EB" />
    
    <!-- ======================================================================= -->
    <!-- PRELECTURAS Y OPTIMIZACIÓN                                              -->
    <!-- ======================================================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.whatsapp.com" />
    
    <!-- ======================================================================= -->
    <!-- FUENTES (fallbacks para rendimiento)                                    -->
    <!-- ======================================================================= -->
    <!-- Nota: Las fuentes se cargan de forma asíncrona para no bloquear el render -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" 
      rel="stylesheet" 
      media="print" 
      onload="this.media='all'"
    />
    
    <!-- ======================================================================= -->
    <!-- ESTILOS CRÍTICOS EN LÍNEA (evita FOIT)                                  -->
    <!-- ======================================================================= -->
    <style>
      /* Fallback para evitar Flash of Unstyled Content */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #f3f4f6;
        transition: background-color 0.3s ease;
      }
      
      /* Soporte para tema oscuro nativo */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #111827;
        }
      }
      
      /* Loader minimalista mientras carga React */
      #root {
        min-height: 100vh;
      }
      
      .corex-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 1.25rem;
        color: #6b7280;
      }
      
      @media (prefers-color-scheme: dark) {
        .corex-loader {
          color: #9ca3af;
        }
      }
    </style>
    
    <!-- ======================================================================= -->
    <!-- SCRIPT DE INICIALIZACIÓN TEMPRANA (tema sin parpadeo)                   -->
    <!-- ======================================================================= -->
    <script>
      (function() {
        // Recuperar tema guardado o usar preferencia del sistema
        const savedTheme = localStorage.getItem('corex_theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
          document.documentElement.classList.add('dark');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#1e293b');
        } else if (savedTheme === 'light') {
          document.documentElement.classList.remove('dark');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#2563EB');
        }
      })();
    </script>
    <script type="module" crossorigin src="/CoreX/assets/index-DlxSA2FP.js"></script>
    <link rel="stylesheet" crossorigin href="/CoreX/assets/index-CAa2fo0y.css">
  </head>
  
  <body>
    <!-- ======================================================================= -->
    <!-- CONTENEDOR PRINCIPAL DE REACT                                           -->
    <!-- ======================================================================= -->
    <!-- React montará toda la aplicación aquí -->
    <div id="root">
      <!-- Loader visual mientras React carga -->
      <div class="corex-loader">
        <div>Cargando CoreX...</div>
      </div>
    </div>
    
    <!-- ======================================================================= -->
    <!-- MANIFEST (PWA) - Opcional                                               -->
    <!-- ======================================================================= -->
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
    
    <!-- Registro de Service Worker solo en producción -->
    
    <!-- Punto de entrada de React (requerido por Vite) -->
  </body>
</html>
